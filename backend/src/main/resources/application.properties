spring.main.banner-mode=off
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=80MB
server.error.include-message=always
server.error.include-binding-errors=always

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/social-posting;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
